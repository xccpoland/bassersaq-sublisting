<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Subwoofer Listing</title>
<link rel="icon" type="image/png" href="sub1.png">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    }

    body {
        height: 100vh;
        overflow: hidden;
        color: white;
        background: radial-gradient(circle at top, #1a1a1a, #000000);
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 0;
        opacity: 0.35;
    }

    .overlay {
        position: relative;
        z-index: 2;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .wrapper {
        display: flex;
        gap: 20px;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
    }

    .card {
        backdrop-filter: blur(30px) saturate(180%);
        -webkit-backdrop-filter: blur(30px) saturate(180%);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 24px;
        padding: 28px;
        width: 380px;
        max-width: 95vw;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        transition: 0.25s ease;
    }

    .card:hover {
        transform: scale(1.05);
    }

    .image {
        width: 320px;
        max-width: 90vw;
        border-radius: 24px;
        backdrop-filter: blur(30px) saturate(180%);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        transition: 0.25s ease;
        overflow: hidden;
    }

    .image img {
        width: 100%;
        display: block;
        border-radius: 24px;
        transition: 0.3s ease;
    }

    .image:hover img {
        transform: scale(1.05);
    }

    .title {
        font-size: 20px;
        margin-bottom: 10px;
        letter-spacing: 0.5px;
    }

    .price {
        font-size: 26px;
        margin: 8px 0;
        color: #00ff99;
    }

    .subprice {
        font-size: 14px;
        opacity: 0.9;
        margin: 6px 0;
    }

    .specs {
        font-size: 14px;
        opacity: 0.85;
        line-height: 1.5;
        margin-top: 10px;
    }

    button {
        margin-top: 12px;
        padding: 10px 15px;
        border: none;
        border-radius: 12px;
        background: rgba(0, 255, 153, 0.9);
        color: black;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
        width: 100%;
    }

    button:hover {
        transform: scale(1.05);
    }

    .discord {
        background: rgba(88, 101, 242, 0.9);
        color: white;
    }

    .footer {
        position: fixed;
        bottom: 6px;
        width: 100%;
        text-align: center;
        font-size: 10px;
        opacity: 0.5;
        z-index: 3;
        padding-bottom: 4px;
    }

    @media (max-width: 900px) {
        .wrapper {
            flex-direction: column;
        }
    }

    @media (max-width: 500px) {
        .card {
            width: 92vw;
            padding: 20px;
        }

        .image {
            width: 92vw;
        }

        .title {
            font-size: 18px;
        }

        .price {
            font-size: 22px;
        }
    }
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="overlay">
    <div class="wrapper">

        <div class="image">
            <img src="sub1.png" alt="Subwoofer Image" />
        </div>

        <div class="card">
            <div class="title">GAS Audio Subwoofer Setup</div>
            <div class="price">€390</div>
            <div class="subprice">For the sub alone: €390</div>
            <div class="subprice">For the box alone: €150</div>

            <div class="specs">
                15 inch subwoofer<br>
                2500W RMS / 5000W MAX<br>
                Deep bass focused build<br>
                Full setup value approx: €750
            </div>

            <a href="https://www.tiktok.com/@rebassedz" target="_blank">
                <button>Contact TikTok</button>
            </a>

            <a href="https://discord.gg/EYxxDJTNrE" target="_blank">
                <button class="discord">Join Discord</button>
            </a>

            <div style="margin-top:10px; font-size:11px; opacity:0.6;">
                <button id="copyEmailBtn" onclick="copyEmail()" style="margin-top:10px; padding:10px 12px; border:none; border-radius:12px; background:rgba(0,255,153,0.9); color:black; font-weight:bold; cursor:pointer; width:100%; transition:0.2s;">
Copy email
</button>
        </div>

    </div>
</div>

<div class="footer">
    Made by XCC - enduro.olimp on tt
</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "POWEREDBYXCCFORBASSERSAQ";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array.from({ length: columns }).fill(1);

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff99";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }
        drops[i]++;
    }
}

setInterval(draw, 33);
function copyEmail() {
    const email = "thebassersaq@gmail.com";
    navigator.clipboard.writeText(email);

    const btn = document.getElementById("copyEmailBtn");
    const oldText = btn.innerText;
    btn.innerText = "Copied twin!";

    setTimeout(() => {
        btn.innerText = oldText;
    }, 1200);
}
</script>

</body>
</html>
